version: '3.8'

services:
  # Main Container - Backend + Frontend
  main:
    build:
      context: .
      dockerfile: docker/main.Dockerfile
    container_name: mas-main
    ports:
      - "9000:9000"  # Backend API
      - "9001:9001"  # Frontend UI
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - SANDBOX_API_URL=http://sandbox:9002
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_TIMEOUT=${CLAUDE_TIMEOUT:-300}
    volumes:
      - ./temp_workspace:/app/temp_workspace
      - ./data:/app/data
    depends_on:
      sandbox:
        condition: service_healthy
    networks:
      - mas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Sandbox Container - Isolated Claude Code execution
  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
    container_name: mas-sandbox
    ports:
      - "9002:9002"  # Sandbox API
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
    volumes:
      - sandbox-workspace:/workspace
    networks:
      - mas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mas-network:
    driver: bridge

volumes:
  sandbox-workspace:
    driver: local
