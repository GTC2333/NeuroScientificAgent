version: '3.8'

services:
  # Main Container - Backend + Frontend + Docker Sandbox Manager
  main:
    build:
      context: .
      dockerfile: docker/main.Dockerfile
    container_name: mas-main
    ports:
      - "9000:9000"  # Backend API
      - "9001:9001"  # Frontend UI
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_TIMEOUT=${CLAUDE_TIMEOUT:-300}
      - MAS_SANDBOX_IMAGE=${MAS_SANDBOX_IMAGE:-mas-sandbox:latest}
      - MAS_NETWORK=${MAS_NETWORK:-mas-network}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mas-network:
    driver: bridge

volumes:
  mas-data:
    driver: local
