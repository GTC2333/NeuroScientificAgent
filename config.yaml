# MAS - Multi-Agent Scientific Operating System
# Default configuration (this file is committed to git)

server:
  host: "0.0.0.0"
  port: 9000

claude:
  cli_path: "~/.local/bin/claude"
  model: "sonnet"
  timeout: 120

project:
  root_dir: "."
  claude_dir: "temp_workspace/.claude"
  agents_dir: "temp_workspace/.claude/agents"
  skills_dir: "temp_workspace/.claude/skills"

sandbox:
  enabled: true
  image: "mas-sandbox:latest"
  network: "mas-network"
  base_dir: "/root/claudeagent/users"
  shared_data_dir: "/root/claudeagent/users/shared/data"
  port_range_start: 30000
  port_range_end: 39999
  mem_limit: "512m"
  cpu_quota: 50000
  gpu_enabled: false
  gpu_devices: ""
  docker_kwargs: {}
  container_port: 9002
