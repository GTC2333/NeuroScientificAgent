<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAS - Research Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-secondary: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-selector {
            display: flex;
            gap: 8px;
        }

        .agent-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .agent-btn:hover {
            border-color: var(--primary);
        }

        .agent-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Main Layout */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .agent-card {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .agent-card:hover {
            border-color: var(--primary);
        }

        .agent-card h4 {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .agent-card p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online { background: var(--success); }
        .status-dot.offline { background: var(--text-secondary); }

        /* Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .message .meta {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: var(--primary-hover);
        }

        .input-area button:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Loading indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Tasks Panel */
        .tasks-panel {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
        }

        .task-item {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .task-status {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .task-status.pending { background: #f1f5f9; color: var(--text-secondary); }
        .task-status.running { background: #fef3c7; color: var(--warning); }
        .task-status.completed { background: #dcfce7; color: var(--success); }
        .task-status.failed { background: #fee2e2; color: var(--error); }

        .task-info {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        /* API Status */
        .api-status {
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .api-status.connected {
            background: #dcfce7;
            color: #166534;
        }

        .api-status.disconnected {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span>🔬</span>
            <span>MAS - Research Agent</span>
        </div>
        <div class="agent-selector">
            <button class="agent-btn active" data-agent="principal">PI</button>
            <button class="agent-btn" data-agent="theorist">Theorist</button>
            <button class="agent-btn" data-agent="experimentalist">Experimentalist</button>
            <button class="agent-btn" data-agent="analyst">Analyst</button>
            <button class="agent-btn" data-agent="writer">Writer</button>
        </div>
    </header>

    <main>
        <aside>
            <div class="sidebar-section">
                <div class="sidebar-title">Available Agents</div>
                <div class="agent-list" id="agent-list">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Available Skills</div>
                <div class="agent-list" id="skill-list">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
        </aside>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="meta">MAS System</div>
                    Welcome to the Multi-Agent Scientific Operating System. I'm the Principal Investigator agent. How can I assist with your research today?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type your research request...">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="tasks-panel">
            <div class="sidebar-section">
                <div class="sidebar-title">Active Tasks</div>
                <div id="task-list">
                    <div class="empty-state">No active tasks</div>
                </div>
            </div>
        </div>
    </main>

    <div class="api-status" id="api-status">Connecting...</div>

    <script>
        const API_BASE = 'http://localhost:9000/api';
        let currentAgent = 'principal';
        let messages = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
            loadSkills();
            loadTasks();
            checkConnection();

            // Agent selector
            document.querySelectorAll('.agent-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentAgent = btn.dataset.agent;
                });
            });

            // Enter key to send
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // Auto-refresh
            setInterval(loadTasks, 5000);
        });

        async function checkConnection() {
            try {
                const res = await fetch('http://localhost:9000/health');
                if (res.ok) {
                    document.getElementById('api-status').textContent = '● Connected';
                    document.getElementById('api-status').className = 'api-status connected';
                }
            } catch {
                document.getElementById('api-status').textContent = '○ Disconnected';
                document.getElementById('api-status').className = 'api-status disconnected';
            }
        }

        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/agents`);
                const agents = await res.json();

                document.getElementById('agent-list').innerHTML = agents.map(a => `
                    <div class="agent-card">
                        <h4><span class="status-dot online"></span>${a.name}</h4>
                        <p>${a.description}</p>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('agent-list').innerHTML = '<div class="empty-state">Failed to load agents</div>';
            }
        }

        async function loadSkills() {
            try {
                const res = await fetch(`${API_BASE}/skills`);
                const skills = await res.json();

                document.getElementById('skill-list').innerHTML = skills.slice(0, 5).map(s => `
                    <div class="agent-card">
                        <h4>${s.name}</h4>
                        <p>${s.description}</p>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('skill-list').innerHTML = '<div class="empty-state">Failed to load skills</div>';
            }
        }

        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/tasks?status=running`);
                const tasks = await res.json();

                if (tasks.length === 0) {
                    document.getElementById('task-list').innerHTML = '<div class="empty-state">No active tasks</div>';
                    return;
                }

                document.getElementById('task-list').innerHTML = tasks.map(t => `
                    <div class="task-item">
                        <div class="task-header">
                            <span class="task-name">${t.name}</span>
                            <span class="task-status ${t.status}">${t.status}</span>
                        </div>
                        <div class="task-info">
                            Agent: ${t.agent}<br>
                            ${t.description}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load tasks:', e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            addMessage('user', message);
            input.value = '';

            // Show loading
            const loadingId = showLoading();

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        agent_type: currentAgent
                    })
                });

                const data = await res.json();
                removeLoading(loadingId);
                addMessage('assistant', data.reply);
            } catch (e) {
                removeLoading(loadingId);
                addMessage('assistant', 'Error: Could not connect to backend. Please ensure the backend is running on port 8000.');
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="meta">${role === 'user' ? 'You' : 'Assistant'}</div>${content}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showLoading() {
            const container = document.getElementById('messages');
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message assistant';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
    </script>
</body>
</html>
